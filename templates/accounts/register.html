<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Portfolio Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 500: '#0ea5e9', 600: '#0284c7' },
                        dark: { bg: '#0f172a', card: '#1e293b', border: '#334155' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-dark-bg text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-4">
        <div class="bg-dark-card rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user-plus text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold">Create Superuser</h1>
                <p class="text-gray-400 mt-2">Register a new admin account</p>
            </div>
            
            {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                <div class="px-4 py-3 rounded-lg {% if message.tags == 'error' %}bg-red-600{% else %}bg-green-600{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium mb-2">Username</label>
                    <input type="text" name="username" required 
                           class="w-full px-4 py-3 rounded-xl bg-dark-bg border border-dark-border focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                           placeholder="Enter username">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" name="email" required 
                           class="w-full px-4 py-3 rounded-xl bg-dark-bg border border-dark-border focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                           placeholder="Enter email">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" name="password" required 
                           class="w-full px-4 py-3 rounded-xl bg-dark-bg border border-dark-border focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                           placeholder="Enter password">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Confirm Password</label>
                    <input type="password" name="confirm_password" required 
                           class="w-full px-4 py-3 rounded-xl bg-dark-bg border border-dark-border focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                           placeholder="Confirm password">
                </div>
                
                <button type="submit" class="w-full px-8 py-3 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-xl transition-all">
                    <i class="fas fa-user-plus mr-2"></i> Create Superuser
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="{% url 'login' %}" class="text-gray-400 hover:text-primary-500 text-sm">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
