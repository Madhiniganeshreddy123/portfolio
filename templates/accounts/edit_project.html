{% extends 'accounts/base.html' %}

{% block title %}Edit Project - {{ project.title }}{% endblock %}

{% block dashboard_content %}
<style>
    .edit-container {
        background: #0f172a;
        color: white;
        min-height: 100vh;
        padding: 20px;
        font-family: 'Inter', Arial, sans-serif;
    }
    
    .edit-header {
        margin-bottom: 30px;
    }
    
    .edit-header h1 {
        font-size: 2rem;
        margin-bottom: 10px;
    }
    
    .edit-form {
        background: #1e293b;
        border-radius: 12px;
        padding: 30px;
        max-width: 800px;
    }
    
    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }
    
    .form-group {
        display: flex;
        flex-direction: column;
    }
    
    .form-group.full-width {
        grid-column: 1 / -1;
    }
    
    .form-group label {
        margin-bottom: 8px;
        color: #94a3b8;
        font-size: 0.9rem;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 12px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        color: white;
        font-size: 1rem;
        box-sizing: border-box;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #3b82f6;
    }
    
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .checkbox-group input[type="checkbox"] {
        width: 20px;
        height: 20px;
    }
    
    .btn-group {
        display: flex;
        gap: 15px;
        margin-top: 30px;
    }
    
    .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s ease;
    }
    
    .btn-primary {
        background: #3b82f6;
        color: white;
    }
    
    .btn-primary:hover {
        background: #2563eb;
    }
    
    .btn-secondary {
        background: #64748b;
        color: white;
    }
    
    .btn-secondary:hover {
        background: #475569;
    }
    
    .btn-danger {
        background: #ef4444;
        color: white;
    }
    
    .btn-danger:hover {
        background: #dc2626;
    }
</style>

<div class="edit-container">
    <div class="edit-header">
        <h1>Edit Project</h1>
        <p style="color: #94a3b8;">Update project information</p>
    </div>
    
    <div class="edit-form">
        <form method="POST">
            {% csrf_token %}
            <div class="form-grid">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" name="title" required value="{{ project.title }}">
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select name="category" required>
                        <option value="analysis" {% if project.category == 'analysis' %}selected{% endif %}>Analysis</option>
                        <option value="development" {% if project.category == 'development' %}selected{% endif %}>Development</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tech Stack</label>
                    <input type="text" name="tech_stack" value="{{ project.tech_stack }}" placeholder="React, Django, PostgreSQL">
                </div>
                <div class="form-group">
                    <label>Display Order</label>
                    <input type="number" name="order" value="{{ project.order }}" min="0">
                </div>
                <div class="form-group">
                    <label>GitHub URL</label>
                    <input type="url" name="github_link" value="{{ project.github_link }}" placeholder="https://github.com/...">
                </div>
                <div class="form-group">
                    <label>Live URL</label>
                    <input type="url" name="demo_link" value="{{ project.demo_link }}" placeholder="https://example.com">
                </div>
                <div class="form-group full-width">
                    <label>Description *</label>
                    <textarea name="description" required rows="3">{{ project.description }}</textarea>
                </div>
                <div class="form-group full-width">
                    <label>Detailed Description</label>
                    <textarea name="detailed_description" rows="5">{{ project.detailed_description }}</textarea>
                </div>
                <div class="form-group full-width">
                    <div class="checkbox-group">
                        <input type="checkbox" name="is_featured" id="is_featured" {% if project.is_featured %}checked{% endif %}>
                        <label for="is_featured">Featured Project</label>
                    </div>
                </div>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{% url 'projects_dashboard' %}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <a href="{% url 'delete_project' project.id %}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this project?')">
                    <i class="fas fa-trash"></i> Delete
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
